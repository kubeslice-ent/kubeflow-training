# =============================================================================
# Kubeflow LLM Training — Helm Values (T4 Demo defaults)
# =============================================================================

nameOverride: ""
fullnameOverride: ""

# -- Container image
image:
  repository: YOUR_REGISTRY/kubeflow-llm-training
  tag: latest
  pullPolicy: IfNotPresent

# -- Training configuration (rendered into ConfigMap)
training:
  # Model
  modelName: "meta-llama/Llama-3.2-3B-Instruct"
  modelRevision: "main"

  # Quantization
  quantization: "4bit"

  # LoRA
  lora:
    r: "16"
    alpha: "32"

  # Dataset
  datasetSource: "huggingface"
  datasetName: "tatsu-lab/alpaca"
  # datasetPath: "/mnt/data/dataset"  # For local/S3 source

  # Hyperparameters
  maxSeqLength: "512"
  numEpochs: "1"
  batchSize: "2"
  gradAccum: "4"
  learningRate: "0.0002"
  fp16: "true"
  bf16: "false"

  # Output
  outputDir: "/mnt/checkpoints"
  saveSteps: "100"
  loggingSteps: "10"

  # Versioning
  modelVersionTag: "t4-demo-v1"

  # Monitoring
  reportTo: "tensorboard"

  # Config file passed to train.py
  configFile: "configs/t4_demo.yaml"

# -- NCCL distributed training settings
nccl:
  debug: "INFO"
  ibDisable: "1"           # Set to "0" for InfiniBand/RDMA
  socketIfname: "eth0"
  # ibHca: "mlx5_0"        # Uncomment for InfiniBand
  # netGdrLevel: "5"       # Uncomment for GPUDirect RDMA

# -- Secrets (provide via --set or use existingSecret)
secrets:
  # Name of a pre-existing Secret to use instead of creating one
  existingSecret: ""
  # If existingSecret is empty, a Secret is created with these values
  hfToken: ""
  awsAccessKey: ""
  awsSecretKey: ""
  s3EndpointUrl: ""
  wandbApiKey: ""

# -- Storage
storage:
  mode: per-node            # "per-node" or "shared"
  storageClass: ""          # Empty = cluster default
  perNode:
    dataSize: 50Gi
    checkpointSize: 50Gi
  shared:
    dataSize: 200Gi
    checkpointSize: 200Gi
    accessMode: ReadWriteMany

# -- PyTorchJob
pytorchjob:
  name: llm-finetune
  restartPolicy: OnFailure

  master:
    replicas: 1
    gpusPerNode: 2
    resources:
      requests:
        cpu: "4"
        memory: "16Gi"
      limits:
        cpu: "8"
        memory: "32Gi"

  worker:
    replicas: 1
    gpusPerNode: 2
    resources:
      requests:
        cpu: "4"
        memory: "16Gi"
      limits:
        cpu: "8"
        memory: "32Gi"

  initContainer:
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"

  shmSize: "4Gi"

  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  # Elastic policy (optional, for production fault tolerance)
  elasticPolicy:
    enabled: false
    rdzvBackend: c10d
    minReplicas: 1
    maxReplicas: 4

  # Torch distributed debug level ("DETAIL", "INFO", or "OFF")
  torchDistributedDebug: "DETAIL"

# -- Monitoring
monitoring:
  tensorboard:
    enabled: true
    image: tensorflow/tensorflow:2.15.0
    reloadInterval: 30
    service:
      type: ClusterIP
      port: 6006
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
