{{- $fullname := include "kubeflow-llm-training.fullname" . }}
{{- $secretName := include "kubeflow-llm-training.secretName" . }}
{{- $imageRef := printf "%s:%s" .Values.image.repository .Values.image.tag }}
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: {{ .Values.pytorchjob.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeflow-llm-training.labels" . | nindent 4 }}
    version: v1
spec:
  {{- if .Values.pytorchjob.elasticPolicy.enabled }}
  elasticPolicy:
    rdzvBackend: {{ .Values.pytorchjob.elasticPolicy.rdzvBackend }}
    minReplicas: {{ .Values.pytorchjob.elasticPolicy.minReplicas }}
    maxReplicas: {{ .Values.pytorchjob.elasticPolicy.maxReplicas }}
  {{- end }}

  pytorchReplicaSpecs:
    # ==================================================================
    # Master Node
    # ==================================================================
    Master:
      replicas: {{ .Values.pytorchjob.master.replicas }}
      restartPolicy: {{ .Values.pytorchjob.restartPolicy }}
      template:
        metadata:
          labels:
            {{- include "kubeflow-llm-training.labels" . | nindent 12 }}
            role: master
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
        spec:
          initContainers:
            - name: download-dataset
              image: {{ $imageRef }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - data/download_dataset.py
              args:
                - "--source"
                - {{ .Values.training.datasetSource | quote }}
                - "--name"
                - {{ .Values.training.datasetName | quote }}
                - "--output"
                - "/mnt/data/dataset"
                - "--skip-if-exists"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: hf-token
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: aws-access-key
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: aws-secret-key
                      optional: true
                - name: S3_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: s3-endpoint-url
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
              resources:
                requests:
                  memory: {{ .Values.pytorchjob.initContainer.resources.requests.memory | quote }}
                  cpu: {{ .Values.pytorchjob.initContainer.resources.requests.cpu | quote }}
                limits:
                  memory: {{ .Values.pytorchjob.initContainer.resources.limits.memory | quote }}
                  cpu: {{ .Values.pytorchjob.initContainer.resources.limits.cpu | quote }}

          containers:
            - name: pytorch
              image: {{ $imageRef }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - train.py
              args:
                - "--config"
                - {{ .Values.training.configFile | quote }}
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: hf-token
                      optional: true
                - name: HF_HOME
                  value: "/mnt/data/.cache/huggingface"
                - name: TRAIN_OUTPUT_DIR
                  value: {{ .Values.training.outputDir | quote }}
                - name: NCCL_DEBUG
                  value: {{ .Values.nccl.debug | quote }}
                - name: NCCL_IB_DISABLE
                  value: {{ .Values.nccl.ibDisable | quote }}
                - name: NCCL_SOCKET_IFNAME
                  value: {{ .Values.nccl.socketIfname | quote }}
                - name: TORCH_NCCL_BLOCKING_WAIT
                  value: "1"
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: {{ .Values.pytorchjob.torchDistributedDebug | quote }}
                - name: WANDB_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: wandb-api-key
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
                - name: checkpoint-volume
                  mountPath: /mnt/checkpoints
                - name: shm
                  mountPath: /dev/shm
              resources:
                requests:
                  memory: {{ .Values.pytorchjob.master.resources.requests.memory | quote }}
                  cpu: {{ .Values.pytorchjob.master.resources.requests.cpu | quote }}
                  nvidia.com/gpu: {{ .Values.pytorchjob.master.gpusPerNode | quote }}
                limits:
                  memory: {{ .Values.pytorchjob.master.resources.limits.memory | quote }}
                  cpu: {{ .Values.pytorchjob.master.resources.limits.cpu | quote }}
                  nvidia.com/gpu: {{ .Values.pytorchjob.master.gpusPerNode | quote }}

          volumes:
            - name: data-volume
              persistentVolumeClaim:
                {{- if eq .Values.storage.mode "shared" }}
                claimName: {{ $fullname }}-data-shared
                {{- else }}
                claimName: {{ $fullname }}-data-master
                {{- end }}
            - name: checkpoint-volume
              persistentVolumeClaim:
                {{- if eq .Values.storage.mode "shared" }}
                claimName: {{ $fullname }}-checkpoints-shared
                {{- else }}
                claimName: {{ $fullname }}-checkpoints-master
                {{- end }}
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: {{ .Values.pytorchjob.shmSize | quote }}

          {{- with .Values.pytorchjob.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}

    # ==================================================================
    # Worker Nodes
    # ==================================================================
    Worker:
      replicas: {{ .Values.pytorchjob.worker.replicas }}
      restartPolicy: {{ .Values.pytorchjob.restartPolicy }}
      template:
        metadata:
          labels:
            {{- include "kubeflow-llm-training.labels" . | nindent 12 }}
            role: worker
        spec:
          initContainers:
            - name: download-dataset
              image: {{ $imageRef }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - data/download_dataset.py
              args:
                - "--source"
                - {{ .Values.training.datasetSource | quote }}
                - "--name"
                - {{ .Values.training.datasetName | quote }}
                - "--output"
                - "/mnt/data/dataset"
                - "--skip-if-exists"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: hf-token
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: aws-access-key
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: aws-secret-key
                      optional: true
                - name: S3_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: s3-endpoint-url
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
              resources:
                requests:
                  memory: {{ .Values.pytorchjob.initContainer.resources.requests.memory | quote }}
                  cpu: {{ .Values.pytorchjob.initContainer.resources.requests.cpu | quote }}
                limits:
                  memory: {{ .Values.pytorchjob.initContainer.resources.limits.memory | quote }}
                  cpu: {{ .Values.pytorchjob.initContainer.resources.limits.cpu | quote }}

          containers:
            - name: pytorch
              image: {{ $imageRef }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - train.py
              args:
                - "--config"
                - {{ .Values.training.configFile | quote }}
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: hf-token
                      optional: true
                - name: HF_HOME
                  value: "/mnt/data/.cache/huggingface"
                - name: TRAIN_OUTPUT_DIR
                  value: {{ .Values.training.outputDir | quote }}
                - name: NCCL_DEBUG
                  value: {{ .Values.nccl.debug | quote }}
                - name: NCCL_IB_DISABLE
                  value: {{ .Values.nccl.ibDisable | quote }}
                - name: NCCL_SOCKET_IFNAME
                  value: {{ .Values.nccl.socketIfname | quote }}
                - name: TORCH_NCCL_BLOCKING_WAIT
                  value: "1"
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: {{ .Values.pytorchjob.torchDistributedDebug | quote }}
                - name: WANDB_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: wandb-api-key
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
                - name: checkpoint-volume
                  mountPath: /mnt/checkpoints
                - name: shm
                  mountPath: /dev/shm
              resources:
                requests:
                  memory: {{ .Values.pytorchjob.worker.resources.requests.memory | quote }}
                  cpu: {{ .Values.pytorchjob.worker.resources.requests.cpu | quote }}
                  nvidia.com/gpu: {{ .Values.pytorchjob.worker.gpusPerNode | quote }}
                limits:
                  memory: {{ .Values.pytorchjob.worker.resources.limits.memory | quote }}
                  cpu: {{ .Values.pytorchjob.worker.resources.limits.cpu | quote }}
                  nvidia.com/gpu: {{ .Values.pytorchjob.worker.gpusPerNode | quote }}

          volumes:
            - name: data-volume
              persistentVolumeClaim:
                {{- if eq .Values.storage.mode "shared" }}
                claimName: {{ $fullname }}-data-shared
                {{- else }}
                claimName: {{ $fullname }}-data-worker-0
                {{- end }}
            - name: checkpoint-volume
              persistentVolumeClaim:
                {{- if eq .Values.storage.mode "shared" }}
                claimName: {{ $fullname }}-checkpoints-shared
                {{- else }}
                claimName: {{ $fullname }}-checkpoints-worker-0
                {{- end }}
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: {{ .Values.pytorchjob.shmSize | quote }}

          {{- with .Values.pytorchjob.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
