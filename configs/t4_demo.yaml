# T4 Demo Profile — 4× NVIDIA T4 (16 GB each), 2 nodes × 2 GPUs
# Optimized for: Customer demo, fast iteration, minimal VRAM

# Model
model_name: "meta-llama/Llama-3.2-3B-Instruct"
model_revision: "main"
trust_remote_code: false

# Quantization — 4-bit QLoRA (essential for T4's 16GB VRAM)
quantization: "4bit"
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true

# LoRA — moderate rank for demo quality
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Dataset
dataset_source: "huggingface"
dataset_name: "tatsu-lab/alpaca"
dataset_split: "train"
max_seq_length: 512
dataset_num_proc: 4

# Training — conservative for T4 VRAM
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
optim: "paged_adamw_32bit"

# Precision — disable AMP GradScaler; bitsandbytes 4-bit handles precision
# internally via bnb_4bit_compute_dtype. AMP fp16 GradScaler is incompatible
# with bitsandbytes ≥0.44 which produces bf16 gradients.
fp16: false
bf16: false

# Memory optimization
gradient_checkpointing: true

# Output
output_dir: "/mnt/checkpoints"
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
logging_steps: 10
logging_first_step: true

# Versioning
model_version_tag: "t4-demo-v1"
save_versioned_checkpoint: true

# Monitoring
report_to:
  - tensorboard
tensorboard_dir: "/mnt/checkpoints/tensorboard"

# Reproducibility
seed: 42
dataloader_num_workers: 2
