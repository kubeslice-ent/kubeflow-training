# ===========================================================================
# Secrets Template — Training Credentials
#
# IMPORTANT: Replace the base64-encoded values before applying!
#
# To encode a value:
#   echo -n "your-token" | base64
#
# Or use kubectl create secret directly:
#   kubectl create secret generic training-secrets \
#     --namespace=kubeflow \
#     --from-literal=hf-token=hf_YOUR_TOKEN \
#     --from-literal=aws-access-key=YOUR_KEY \
#     --from-literal=aws-secret-key=YOUR_SECRET \
#     --from-literal=wandb-api-key=YOUR_WANDB_KEY \
#     --from-literal=s3-endpoint-url=https://s3.amazonaws.com
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: training-secrets
  namespace: kubeflow
  labels:
    app: llm-training
type: Opaque
data:
  # HuggingFace token (required for gated models like Llama)
  # echo -n "hf_YOUR_TOKEN" | base64
  hf-token: "REPLACE_WITH_BASE64_ENCODED_HF_TOKEN"

  # AWS S3 credentials (required when using S3 dataset source)
  # echo -n "YOUR_ACCESS_KEY" | base64
  aws-access-key: "REPLACE_WITH_BASE64_ENCODED_ACCESS_KEY"
  # echo -n "YOUR_SECRET_KEY" | base64
  aws-secret-key: "REPLACE_WITH_BASE64_ENCODED_SECRET_KEY"

  # S3 endpoint URL (for non-AWS S3-compatible storage like MinIO)
  # echo -n "https://s3.amazonaws.com" | base64
  s3-endpoint-url: "REPLACE_WITH_BASE64_ENCODED_ENDPOINT"

  # Weights & Biases API key (optional, for wandb monitoring)
  # echo -n "YOUR_WANDB_KEY" | base64
  wandb-api-key: "REPLACE_WITH_BASE64_ENCODED_WANDB_KEY"
