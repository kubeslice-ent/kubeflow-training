# ===========================================================================
# ConfigMap — Training Configuration
#
# Environment variable overrides for train.py.
# These override values from the YAML config file.
# Useful for quick parameter changes without rebuilding the Docker image.
# ===========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-config
  namespace: kubeflow
  labels:
    app: llm-training
data:
  # ---------- Model ----------
  TRAIN_MODEL_NAME: "meta-llama/Llama-3.2-3B-Instruct"
  TRAIN_MODEL_REVISION: "main"

  # ---------- Quantization ----------
  TRAIN_QUANTIZATION: "4bit"

  # ---------- LoRA ----------
  TRAIN_LORA_R: "16"
  TRAIN_LORA_ALPHA: "32"

  # ---------- Dataset ----------
  TRAIN_DATASET_SOURCE: "huggingface"
  TRAIN_DATASET_NAME: "tatsu-lab/alpaca"
  # TRAIN_DATASET_PATH: "/mnt/data/dataset"  # For local/S3 source

  # ---------- Training ----------
  TRAIN_MAX_SEQ_LENGTH: "512"
  TRAIN_NUM_EPOCHS: "1"
  TRAIN_BATCH_SIZE: "2"
  TRAIN_GRAD_ACCUM: "4"
  TRAIN_LEARNING_RATE: "0.0002"
  TRAIN_FP16: "true"
  TRAIN_BF16: "false"

  # ---------- Output ----------
  TRAIN_OUTPUT_DIR: "/mnt/checkpoints"
  TRAIN_SAVE_STEPS: "100"
  TRAIN_LOGGING_STEPS: "10"

  # ---------- Versioning ----------
  TRAIN_MODEL_VERSION_TAG: "t4-demo-v1"

  # ---------- Monitoring ----------
  TRAIN_REPORT_TO: "tensorboard"

  # ---------- NCCL ----------
  NCCL_DEBUG: "INFO"
  NCCL_IB_DISABLE: "1"        # Set to "0" for InfiniBand/RDMA
  NCCL_SOCKET_IFNAME: "eth0"
  # NCCL_IB_HCA: "mlx5_0"     # Uncomment for InfiniBand
  # NCCL_NET_GDR_LEVEL: "5"   # Uncomment for GPUDirect RDMA
