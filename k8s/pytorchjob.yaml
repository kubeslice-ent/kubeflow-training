# ===========================================================================
# PyTorchJob — Distributed LLM Fine-Tuning (4× T4, 2 nodes × 2 GPUs)
#
# This manifest creates a distributed training job using Kubeflow Training
# Operator. It runs torchrun with FSDP across 2 nodes, each with 2 T4 GPUs.
#
# Prerequisites:
#   1. Kubeflow Training Operator installed (v1.7+)
#   2. NVIDIA GPU Operator / Device Plugin installed
#   3. PVCs created (see pvc.yaml)
#   4. Secrets created (see secrets.yaml)
#   5. Docker image built and pushed to your registry
#
# Usage:
#   kubectl apply -f k8s/pvc.yaml
#   kubectl apply -f k8s/secrets.yaml
#   kubectl apply -f k8s/configmap.yaml
#   kubectl apply -f k8s/pytorchjob.yaml
#
# Monitor:
#   kubectl get pytorchjobs
#   kubectl logs -f llm-finetune-master-0
# ===========================================================================
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: llm-finetune
  namespace: kubeflow
  labels:
    app: llm-training
    version: v1
spec:
  # --- Elastic Policy (optional, for production fault tolerance) ---
  # elasticPolicy:
  #   rdzvBackend: c10d
  #   minReplicas: 1
  #   maxReplicas: 4

  pytorchReplicaSpecs:
    # ==================================================================
    # Master Node — Rank 0 (also runs 2 GPU workers via torchrun)
    # ==================================================================
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: llm-training
            role: master
          annotations:
            # Prometheus scraping (if enabled)
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
        spec:
          # --- Init Container: Download Dataset ---
          initContainers:
            - name: download-dataset
              image: YOUR_REGISTRY/kubeflow-llm-training:latest  # REPLACE
              command:
                - python
                - data/download_dataset.py
              args:
                - "--source"
                - "huggingface"        # Change to "s3" for production
                - "--name"
                - "tatsu-lab/alpaca"   # Change for your dataset
                - "--output"
                - "/mnt/data/dataset"
                - "--skip-if-exists"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: hf-token
                      optional: true
                # S3 credentials (for s3 source)
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: aws-access-key
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: aws-secret-key
                      optional: true
                - name: S3_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: s3-endpoint-url
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
              resources:
                requests:
                  memory: "4Gi"
                  cpu: "2"
                limits:
                  memory: "8Gi"
                  cpu: "4"

          # --- Main Training Container ---
          containers:
            - name: pytorch
              image: YOUR_REGISTRY/kubeflow-llm-training:latest  # REPLACE
              command:
                - python
                - train.py
              args:
                - "--config"
                - "configs/t4_demo.yaml"   # Swap to h100_prod.yaml for production
              env:
                # ---- HuggingFace ----
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: hf-token
                      optional: true
                - name: HF_HOME
                  value: "/mnt/data/.cache/huggingface"
                # ---- Training overrides (via ConfigMap) ----
                - name: TRAIN_OUTPUT_DIR
                  value: "/mnt/checkpoints"
                # ---- NCCL Configuration ----
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "1"               # Set to "0" for InfiniBand
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"            # Adjust for your network interface
                - name: TORCH_NCCL_BLOCKING_WAIT
                  value: "1"
                # CRITICAL: Raise exceptions on NCCL errors instead of hanging
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                # Enable detailed distributed debug logs for troubleshooting
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"          # Set to "OFF" for production
                # ---- WandB (optional) ----
                - name: WANDB_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: wandb-api-key
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
                - name: checkpoint-volume
                  mountPath: /mnt/checkpoints
                - name: shm
                  mountPath: /dev/shm
              resources:
                requests:
                  memory: "16Gi"
                  cpu: "4"
                  nvidia.com/gpu: "2"
                limits:
                  memory: "32Gi"
                  cpu: "8"
                  nvidia.com/gpu: "2"

          volumes:
            # Per-node PVC for data (configurable: switch to shared PVC)
            - name: data-volume
              persistentVolumeClaim:
                claimName: training-data-master  # Per-node PVC
                # claimName: training-data-shared  # Shared PVC (NFS/EFS)
            # Per-node PVC for checkpoints
            - name: checkpoint-volume
              persistentVolumeClaim:
                claimName: training-checkpoints-master  # Per-node PVC
                # claimName: training-checkpoints-shared  # Shared PVC
            # Shared memory for NCCL
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: "4Gi"

          # Ensure pods are scheduled on GPU nodes
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

    # ==================================================================
    # Worker Node — Rank 1 (also runs 2 GPU workers via torchrun)
    # ==================================================================
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: llm-training
            role: worker
        spec:
          # --- Init Container: Download Dataset (each node gets its own copy) ---
          initContainers:
            - name: download-dataset
              image: YOUR_REGISTRY/kubeflow-llm-training:latest  # REPLACE
              command:
                - python
                - data/download_dataset.py
              args:
                - "--source"
                - "huggingface"
                - "--name"
                - "tatsu-lab/alpaca"
                - "--output"
                - "/mnt/data/dataset"
                - "--skip-if-exists"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: hf-token
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: aws-access-key
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: aws-secret-key
                      optional: true
                - name: S3_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: s3-endpoint-url
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
              resources:
                requests:
                  memory: "4Gi"
                  cpu: "2"
                limits:
                  memory: "8Gi"
                  cpu: "4"

          # --- Main Training Container ---
          containers:
            - name: pytorch
              image: YOUR_REGISTRY/kubeflow-llm-training:latest  # REPLACE
              command:
                - python
                - train.py
              args:
                - "--config"
                - "configs/t4_demo.yaml"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: hf-token
                      optional: true
                - name: HF_HOME
                  value: "/mnt/data/.cache/huggingface"
                - name: TRAIN_OUTPUT_DIR
                  value: "/mnt/checkpoints"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: TORCH_NCCL_BLOCKING_WAIT
                  value: "1"
                - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                  value: "1"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: WANDB_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: training-secrets
                      key: wandb-api-key
                      optional: true
              volumeMounts:
                - name: data-volume
                  mountPath: /mnt/data
                - name: checkpoint-volume
                  mountPath: /mnt/checkpoints
                - name: shm
                  mountPath: /dev/shm
              resources:
                requests:
                  memory: "16Gi"
                  cpu: "4"
                  nvidia.com/gpu: "2"
                limits:
                  memory: "32Gi"
                  cpu: "8"
                  nvidia.com/gpu: "2"

          volumes:
            - name: data-volume
              persistentVolumeClaim:
                claimName: training-data-worker-0  # Per-node PVC
                # claimName: training-data-shared  # Shared PVC
            - name: checkpoint-volume
              persistentVolumeClaim:
                claimName: training-checkpoints-worker-0  # Per-node PVC
                # claimName: training-checkpoints-shared  # Shared PVC
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: "4Gi"

          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
