# ===========================================================================
# Persistent Volume Claims for Training Data and Checkpoints
#
# Three modes (pick ONE — uncomment the section you need):
#
#   Option A: Shared PVCs (RECOMMENDED)
#     - Single PVC shared across all nodes via ReadWriteMany
#     - Requires NFS/EFS/Longhorn StorageClass
#     - TensorBoard sees all metrics from all nodes
#
#   Option B: Per-Node PVCs
#     - Each node gets its own ReadWriteOnce PVC
#     - IMPORTANT: StorageClass MUST use volumeBindingMode: WaitForFirstConsumer
#       to ensure PVs are provisioned on the same node as the pod
#     - Only supports 1 worker replica
#
#   Option C: No PVCs (emptyDir)
#     - Comment out ALL PVCs below
#     - Change pytorchjob.yaml volumes to use emptyDir instead of PVC
#     - Data lost when pods terminate — use only for quick testing
#
# ===========================================================================

# ===========================================================================
# Option A: Shared PVCs (Recommended — Production + Dev)
# ===========================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-data-shared
  namespace: kubeflow
  labels:
    app: llm-training
    component: data-shared
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: nfs    # CHANGE to your RWX StorageClass (nfs, efs-sc, longhorn, etc.)

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-checkpoints-shared
  namespace: kubeflow
  labels:
    app: llm-training
    component: checkpoints-shared
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: nfs    # CHANGE to your RWX StorageClass

# ===========================================================================
# Option B: Per-Node PVCs (uncomment below, comment out Option A above)
# IMPORTANT: Your StorageClass MUST have volumeBindingMode: WaitForFirstConsumer
# ===========================================================================

