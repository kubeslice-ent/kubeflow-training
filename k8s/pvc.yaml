# ===========================================================================
# Persistent Volume Claims for Training Data and Checkpoints
#
# Two modes:
#   1. Per-node PVCs (default for T4 demo) — each node has its own storage
#   2. Shared PVC (for production with NFS/EFS) — single shared volume
#
# Uncomment the section you need based on your storage backend.
# ===========================================================================

# ===========================================================================
# Option A: Per-Node PVCs (Default — T4 Demo)
# Each node gets its own PVC. Data is downloaded independently by init containers.
# ===========================================================================

# --- Master Node Data ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-data-master
  namespace: kubeflow
  labels:
    app: llm-training
    component: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  # storageClassName: your-storage-class  # Uncomment and set for your cluster

---
# --- Master Node Checkpoints ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-checkpoints-master
  namespace: kubeflow
  labels:
    app: llm-training
    component: checkpoints
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# --- Worker Node Data ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-data-worker-0
  namespace: kubeflow
  labels:
    app: llm-training
    component: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# --- Worker Node Checkpoints ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-checkpoints-worker-0
  namespace: kubeflow
  labels:
    app: llm-training
    component: checkpoints
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
