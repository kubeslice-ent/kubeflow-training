[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = ["train.py", "data/"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
# E = pycodestyle errors, F = pyflakes (undefined names, unused imports), W = warnings

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
