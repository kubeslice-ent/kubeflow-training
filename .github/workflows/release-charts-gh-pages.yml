name: Release Helm Charts to gh-pages Branch 

on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      kubeflow-training:
        type: choice
        description: 'Release kubeflow-training Helm Chart'
        default: 'No'
        required: true
        options:
        - 'Yes'
        - 'No'
        
permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          path: 'src'
          fetch-depth: 0
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          path: 'dest'
          ref: 'gh-pages'
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.8.1

      - name: Display Selected Charts and Source Branch
        shell: bash
        run: |
          echo "Publishing charts from branch: ${{ github.ref_name }}"
          echo "Selected charts:"
          if [ "${{ github.event.inputs.kubeflow-training }}" == "Yes" ]; then
            echo "  - kubeflow-training"
          fi

      - name: Package kubeflow-training Helm Chart
        shell: bash
        if: ${{ github.event.inputs.kubeflow-training == 'Yes' }}
        run: |
          helm dependency update "helm/kubeflow-llm-training/"
          helm package "helm/kubeflow-llm-training/" -u -d dest

      - name: Update Helm Repository Index and Push Changes
        shell: bash
        working-directory: dest
        if: |
          github.event.inputs.kubeflow-training == 'Yes'
        run: |
          # Generate index for root directory (excluding nexus subdirectory)
          helm repo index . --url https://raw.githubusercontent.com/kubeslice-ent/kubeflow-training/gh-pages/ --merge index.yaml
          git config --global user.email "avesha-bot@aveshasystems.com"
          git config --global user.name "Avesha Bot"
          git add $(git ls-files -o --exclude-standard)
          git add index.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update chart index from branch: ${{ github.ref_name }}"
            git push -f origin gh-pages
          fi
